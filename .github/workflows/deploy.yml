# ============================================================================
# DEPLOY DOCS — docs.hasfy.fr
# ============================================================================
# Repo: HasfyFR/Hasfy-Docs
# Trigger: push sur branche 'main'
# Image: ghcr.io/hasfyfr/hasfy-docs:latest
# K8s: Deployment hasfy-docs (namespace docs)
#
# Secrets requis dans le repo GitHub:
#   KUBECONFIG_OVH — kubeconfig OVH MKS (base64)
#   NEXT_PUBLIC_SUPABASE_URL — URL Supabase
#   NEXT_PUBLIC_SUPABASE_ANON_KEY — Clé publique Supabase
#   SUPABASE_SERVICE_ROLE_KEY — Clé service Supabase (runtime)
#   NEXT_PUBLIC_SITE_URL — URL du site en production
# ============================================================================
name: Deploy Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-docs
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/hasfyfr/hasfy-docs
  DEPLOYMENT: hasfy-docs
  NAMESPACE: docs

jobs:
  build-and-deploy:
    name: Build & Deploy Docs
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_OVH }}" | base64 -d > ~/.kube/config

      - name: Set runtime environment variables
        run: |
          kubectl set env deployment/${{ env.DEPLOYMENT }} \
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }} \
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }} \
            SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }} \
            NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }} \
            -n ${{ env.NAMESPACE }}

      - name: Deploy to OVH MKS
        run: |
          kubectl set image deployment/${{ env.DEPLOYMENT }} \
            docs=${{ env.IMAGE }}:${{ github.sha }} \
            -n ${{ env.NAMESPACE }}
          kubectl rollout status deployment/${{ env.DEPLOYMENT }} \
            -n ${{ env.NAMESPACE }} --timeout=300s

      - name: Smoke test
        run: |
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://docs.hasfy.fr)
          echo "docs.hasfy.fr → HTTP $STATUS"
