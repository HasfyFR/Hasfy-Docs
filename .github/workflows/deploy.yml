# ============================================================================
# DEPLOY DOCS — docs.hasfy.fr
# ============================================================================
# Repo: HasfyFR/Hasfy-Docs
# Trigger: push sur branche 'main'
# Image: ghcr.io/hasfyfr/hasfy-docs:latest
# K8s: Deployment hasfy-docs (namespace docs)
#
# Hypothèse: le repo contient un site statique (Jekyll, MkDocs, Docusaurus…)
# Le Dockerfile sert le contenu via nginx.
# Si pas de Dockerfile dans le repo, un Dockerfile par défaut est créé ci-dessous.
#
# Secrets requis dans le repo GitHub:
#   KUBECONFIG_OVH — contenu du fichier ~/.kube/hasfy-ovh.yaml (base64)
# ============================================================================
name: Deploy Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-docs
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/hasfyfr/hasfy-docs
  DEPLOYMENT: hasfy-docs
  NAMESPACE: docs

jobs:
  build-and-deploy:
    name: Build & Deploy Docs
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Dockerfile if missing
        run: |
          if [ ! -f Dockerfile ]; then
            cat > Dockerfile << 'DOCKERFILE'
          FROM node:20-alpine AS build
          WORKDIR /app
          COPY package*.json ./
          RUN npm ci
          COPY . .
          RUN npm run build

          FROM nginx:alpine
          COPY --from=build /app/build /usr/share/nginx/html
          COPY --from=build /app/build /usr/share/nginx/html
          EXPOSE 80
          DOCKERFILE
            echo "::notice::Dockerfile auto-generated (Node build → nginx)"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_OVH }}" | base64 -d > ~/.kube/config

      - name: Deploy to OVH MKS
        run: |
          kubectl set image deployment/${{ env.DEPLOYMENT }} \
            docs=${{ env.IMAGE }}:${{ github.sha }} \
            -n ${{ env.NAMESPACE }}
          kubectl rollout status deployment/${{ env.DEPLOYMENT }} \
            -n ${{ env.NAMESPACE }} --timeout=120s

      - name: Smoke test
        run: |
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://docs.hasfy.fr)
          echo "docs.hasfy.fr → HTTP $STATUS"
